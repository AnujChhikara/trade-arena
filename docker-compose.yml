services:
  trade-arena-api:
    image: ghcr.io/anujchhikara/trade-arena-api:latest
    container_name: trade-arena-api
    restart: unless-stopped
    env_file: .env
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - compose_default
      - homelab

  trade-arena-frontend:
    image: ghcr.io/anujchhikara/trade-arena-frontend:latest
    container_name: trade-arena-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - trade-arena-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - homelab

networks:
  compose_default:
    external: true
  homelab:
    external: true
