services:
  postgres:
    image: postgres:16-alpine
    container_name: trade-arena-db
    environment:
      POSTGRES_DB: trade_arena
      POSTGRES_USER: trade_arena
      POSTGRES_PASSWORD: trade_arena_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_arena"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trade-arena-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
